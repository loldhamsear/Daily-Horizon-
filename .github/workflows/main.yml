name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Mobile Project
      run: |
        cordova create app-project com.dailyhorizon.tracker DailyHorizon
        cd app-project
        cordova platform add android
        rm -rf www/*
        cp ../index.html www/
        
        # Safely copy your uploaded icon right into the main project root 
        # Cordova automatically looks for icon.png here by default!
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
        fi
        
    - name: Build Android APK
      run: |
        cd app-project
        cordova build android --no-telemetry --device

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: DailyHorizon-APK
        path: app-project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        
