name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-on: '20'

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Initialize Web APK
      run: |
        bubblewrap init --manifest=manifest.json --meta=none --output=app-project
        cd app-project
        bubblewrap build

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DailyHorizon-APK
        path: app-project/*.apk
        
