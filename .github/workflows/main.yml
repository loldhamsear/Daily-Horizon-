name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Mobile Project
      run: |
        cordova create app-project com.dailyhorizon.tracker DailyHorizon
        cd app-project
        cordova platform add android
        
        # Clear out the default files and copy yours in
        rm -rf www/*
        cp ../index.html www/
        
        # Copy your config and icon into the correct spots safely
        if [ -f "../config.xml" ]; then
          cp ../config.xml config.xml
        fi
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
          cp ../icon.png www/icon.png
        fi
        
    - name: Build Android APK
      run: |
        cd app-project
        cordova build android --no-telemetry --device

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: DailyHorizon-APK
        path: app-project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
